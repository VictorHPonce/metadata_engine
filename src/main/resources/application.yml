spring:
  application:
    name: fabric

  config:
    import: "optional:file:.env[.properties]"

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update #validate # En producción es mejor 'validate' que 'update' para evitar cambios accidentales
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: never

server:
  port: 8080

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
  chat:
    id: ${TELEGRAM_CHAT_ID}